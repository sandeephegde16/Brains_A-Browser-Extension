<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-body">
  <main class="popup-shell">
    <header class="hero-card">
      <div class="hero-brand">
        <div class="hero-mark-wrap">
          <img class="hero-mark" src="../icons/icon48.png" alt="Brains icon">
        </div>
        <div>
          <p class="eyebrow">Personal knowledge clipper</p>
          <h1>Brains</h1>
        </div>
      </div>
      <p class="hero-copy">
        Save clean markdown to Google Drive with tags and images, then generate wiki pages when you are ready.
      </p>
    </header>

    <div class="popup-content">
      <div id="status-not-configured" class="status warning" style="display:none;">
        <span>No Drive folder configured.</span>
        <a href="#" id="open-options">Open Options</a>
      </div>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-label" id="panel-label">Current clip</p>
            <div class="tab-row">
              <button type="button" class="tab-btn tab-active" id="tab-clip">Clip</button>
              <button type="button" class="tab-btn" id="tab-thought">Thought</button>
            </div>
          </div>
        </div>

        <div id="content-area" class="content-area">
          <div class="field-group">
            <label for="brain-select">Brain</label>
            <select id="brain-select">
              <option value="">Loading…</option>
            </select>
            <div id="new-brain-row" class="new-brain-row" style="display:none;">
              <input type="text" id="new-brain-input" placeholder="Brain name…">
              <button type="button" id="new-brain-confirm">Add</button>
              <button type="button" id="new-brain-cancel" class="btn-ghost">&times;</button>
            </div>
          </div>

          <div class="field-group">
            <label for="title-input" id="title-label">Title</label>
            <input type="text" id="title-input" placeholder="Page title...">
          </div>

          <div class="field-group">
            <label for="tags-input">Tags</label>
            <div class="tags-container">
              <div id="tags-list" class="tags-list"></div>
              <input type="text" id="tags-input" placeholder="Add tag and press Enter...">
            </div>
          </div>

          <!-- Clip mode: article preview -->
          <div id="clip-fields">
            <div class="field-group">
              <label for="preview">Preview</label>
              <textarea id="preview" readonly rows="5" placeholder="Extracting content..."></textarea>
            </div>
            <div id="image-info" class="image-info" style="display:none;"></div>
          </div>

          <!-- Thought mode: voice/text input -->
          <div id="thought-fields" style="display:none;">
            <div class="field-group">
              <div class="thought-header">
                <label for="thought-input">Thought</label>
                <span id="thought-word-count" class="word-count"></span>
              </div>
              <div class="thought-input-wrap">
                <textarea id="thought-input" rows="6" placeholder="Speak or type your thought…"></textarea>
                <div id="interim-overlay" class="interim-overlay" aria-hidden="true"></div>
              </div>
              <div id="mic-help-notice" class="mic-help-notice" style="display:none;"></div>
              <div class="mic-row">
                <button type="button" id="mic-btn" class="mic-btn" title="Start recording">
                  <svg id="mic-icon" class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="12" rx="3"/>
                    <path d="M5 10a7 7 0 0 0 14 0"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                    <line x1="8"  y1="22" x2="16" y2="22"/>
                  </svg>
                  <span id="mic-pulse" class="mic-pulse" style="display:none;"></span>
                </button>
                <span id="mic-status" class="mic-status">Tap to record</span>
              </div>
            </div>
            <div id="thought-draft-notice" class="draft-notice" style="display:none;"></div>
          </div>

          <div class="action-stack">
            <button id="clip-btn" class="primary-button" disabled>Save</button>
            <button id="wiki-btn" class="primary-button" disabled>Generate Wiki</button>
            <div id="wiki-status" class="wiki-status" style="display:none;"></div>
          </div>
        </div>
      </section>

      <div id="status-area" class="status" style="display:none;">
        <div class="status-copy">
          <div id="status-message"></div>
          <a id="drive-link" href="#" target="_blank" rel="noopener noreferrer" style="display:none;">Open in Drive</a>
        </div>
      </div>

      <div id="loading" class="loading-row" style="display:none;">
        <div class="spinner"></div>
        <span id="loading-text">Saving...</span>
      </div>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
